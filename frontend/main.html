<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Copilot - AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e12;
            height: 100vh;
            overflow: hidden;
        }

        /* App Container */
        .app-container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #11161c;
            border-right: 1px solid #1e2a2e;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid #1e2a2e;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: #0D9488;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon i {
            font-size: 20px;
            color: white;
        }

        .logo h1 {
            font-size: 1.1rem;
            color: white;
        }

        .logo p {
            font-size: 0.6rem;
            color: #6b7a8a;
            margin-top: 2px;
        }

        .sidebar-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .section {
            margin-bottom: 24px;
        }

        .section-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #0D9488;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .custom-select {
            width: 100%;
            padding: 10px 12px;
            background: #1a1f26;
            border: 1px solid #2a353a;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #e1e8f0;
            cursor: pointer;
        }

        .custom-select:focus {
            outline: none;
            border-color: #0D9488;
        }

        /* Recent Searches */
        .recent-section {
            margin-top: 20px;
        }

        .recent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .clear-recent {
            background: none;
            border: none;
            color: #e04f5f;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .recent-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .recent-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            background: #1a1f26;
            border-radius: 6px;
            margin-bottom: 6px;
            cursor: pointer;
        }

        .recent-item:hover {
            background: #22282f;
        }

        .recent-query {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            overflow: hidden;
        }

        .recent-query i {
            color: #0D9488;
            font-size: 0.7rem;
        }

        .recent-query span {
            color: #e1e8f0;
            font-size: 0.75rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .delete-recent {
            background: none;
            border: none;
            color: #6b7a8a;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .delete-recent:hover {
            color: #e04f5f;
        }

        .empty-recent {
            text-align: center;
            padding: 15px;
            color: #6b7a8a;
            font-size: 0.7rem;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid #1e2a2e;
        }

        .clear-btn {
            width: 100%;
            padding: 10px;
            background: rgba(224, 79, 95, 0.1);
            border: 1px solid rgba(224, 79, 95, 0.3);
            border-radius: 8px;
            color: #e04f5f;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .clear-btn:hover {
            background: rgba(224, 79, 95, 0.2);
        }

        /* Main Chat Area */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0d1117;
        }

        .chat-header {
            padding: 16px 24px;
            background: #11161c;
            border-bottom: 1px solid #1e2a2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .assistant-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .assistant-avatar {
            width: 40px;
            height: 40px;
            background: #0D9488;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .assistant-avatar i {
            font-size: 20px;
            color: white;
        }

        .assistant-details h3 {
            font-size: 0.9rem;
            color: white;
        }

        .assistant-details p {
            font-size: 0.65rem;
            color: #6b7a8a;
        }

        .online-indicator {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #4caf50;
            border-radius: 50%;
            margin-right: 5px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 34px;
            height: 34px;
            background: #1a1f26;
            border: 1px solid #2a353a;
            border-radius: 8px;
            color: #0D9488;
            cursor: pointer;
        }

        .icon-btn:hover {
            background: #22282f;
        }

        /* Messages Container */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Message Bubbles */
        .message {
            display: flex;
            gap: 10px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .message.bot .message-avatar {
            background: #0D9488;
        }

        .message.user .message-avatar {
            background: #1a2a2a;
            border: 1px solid #2a353a;
        }

        .message-avatar i {
            font-size: 14px;
            color: white;
        }

        .message.user .message-avatar i {
            color: #0D9488;
        }

        .message-content {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.85rem;
            line-height: 1.5;
            position: relative;
        }

        .message.bot .message-content {
            background: #1a1f26;
            border: 1px solid #2a353a;
            color: #e1e8f0;
        }

        .message.user .message-content {
            background: #0D9488;
            color: white;
        }

        /* Copy Button */
        .copy-btn {
            position: absolute;
            right: 6px;
            bottom: 6px;
            background: rgba(26, 31, 38, 0.9);
            border: none;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 0.55rem;
            color: #0D9488;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .read-msg-btn {
            position: absolute;
            right: 45px;
            bottom: 6px;
            background: rgba(26, 31, 38, 0.9);
            border: none;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 0.55rem;
            color: #0D9488;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .message.bot .message-content:hover .copy-btn,
        .message.bot .message-content:hover .read-msg-btn {
            opacity: 1;
        }

        .copy-btn:hover, .read-msg-btn:hover {
            background: #0D9488;
            color: white;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #0D9488;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* Follow-up Dropdown */
        .followup-card {
            margin-left: 42px;
            background: #1a1f26;
            border: 1px solid #2a353a;
            border-radius: 10px;
            padding: 12px;
            margin-top: 8px;
        }

        .followup-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
            color: #0D9488;
            font-size: 0.7rem;
        }

        .followup-select {
            width: 100%;
            padding: 8px 10px;
            background: #0d1117;
            border: 1px solid #2a353a;
            border-radius: 6px;
            color: #e1e8f0;
            font-size: 0.8rem;
            margin-bottom: 8px;
        }

        .ask-followup-btn {
            width: 100%;
            padding: 8px;
            background: #0D9488;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .ask-followup-btn:hover {
            background: #00695c;
        }

        /* Input Area */
        .input-area {
            padding: 16px 24px;
            background: #11161c;
            border-top: 1px solid #1e2a2e;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-wrapper textarea {
            flex: 1;
            padding: 10px 14px;
            background: #1a1f26;
            border: 1px solid #2a353a;
            border-radius: 10px;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            color: #e1e8f0;
            resize: none;
        }

        .input-wrapper textarea:focus {
            outline: none;
            border-color: #0D9488;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .voice-btn, .voice-output-btn, .stop-btn, .send-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
        }

        .voice-btn {
            background: #8B5CF6;
            color: white;
        }

        .voice-btn.listening {
            background: #EF4444;
            animation: pulse 1s infinite;
        }

        .voice-output-btn {
            background: #10B981;
            color: white;
        }

        .voice-output-btn.speaking {
            background: #F59E0B;
            animation: pulse 1s infinite;
        }

        .stop-btn {
            background: #EF4444;
            color: white;
        }

        .send-btn {
            background: #0D9488;
            color: white;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Toast - Minimal, no sound notifications */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #10B981;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            font-size: 0.7rem;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(20px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        /* Listening Overlay */
        .listening-overlay {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #8B5CF6, #6D28D9);
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.8rem;
            animation: pulseGlow 1s infinite;
        }

        .wave-animation {
            display: flex;
            gap: 3px;
            align-items: center;
        }

        .wave-animation span {
            width: 3px;
            height: 12px;
            background: white;
            border-radius: 2px;
            animation: wave 0.6s infinite;
        }

        .wave-animation span:nth-child(2) { animation-delay: 0.1s; height: 20px; }
        .wave-animation span:nth-child(3) { animation-delay: 0.2s; height: 16px; }
        .wave-animation span:nth-child(4) { animation-delay: 0.3s; height: 22px; }
        .wave-animation span:nth-child(5) { animation-delay: 0.4s; height: 14px; }

        @keyframes wave {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.5); }
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(139, 92, 246, 0.5); }
            50% { box-shadow: 0 0 20px rgba(139, 92, 246, 0.8); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1f26;
        }
        ::-webkit-scrollbar-thumb {
            background: #0D9488;
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                height: 100%;
                z-index: 100;
            }
            .message-content {
                max-width: 85%;
            }
            .listening-overlay {
                padding: 8px 16px;
                font-size: 0.7rem;
                gap: 8px;
                bottom: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon"><i class="fas fa-robot"></i></div>
                    <div><h1>Platform Copilot</h1><p>AI-POWERED ASSISTANT</p></div>
                </div>
            </div>
            <div class="sidebar-content">
                <div class="section">
                    <div class="section-label"><i class="fas fa-user-tie"></i> SELECT YOUR ROLE</div>
                    <select id="intentSelect" class="custom-select">
                        <option value="">Choose a role...</option>
                    </select>
                    <div id="categorySection" style="display:none; margin-top: 15px;">
                        <div class="section-label"><i class="fas fa-list"></i> SELECT TOPIC</div>
                        <select id="categorySelect" class="custom-select">
                            <option value="">Choose a topic...</option>
                        </select>
                    </div>
                </div>
                <div class="recent-section">
                    <div class="recent-header">
                        <div class="section-label"><i class="fas fa-history"></i> RECENTLY SEARCHED</div>
                        <button id="clearAllRecent" class="clear-recent">Clear All</button>
                    </div>
                    <div id="recentList" class="recent-list">
                        <div class="empty-recent">No recent searches</div>
                    </div>
                </div>
                <div class="recent-section" id="voiceSettings" style="margin-top: 15px;">
                    <div class="section-label"><i class="fas fa-volume-up"></i> VOICE SETTINGS</div>
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox" id="autoSpeak" style="width: 16px; height: 16px;">
                        <span style="color: #e1e8f0; font-size: 0.75rem;">Auto-read AI responses</span>
                    </label>
                </div>
            </div>
            <div class="sidebar-footer">
                <button id="clearChat" class="clear-btn"><i class="fas fa-trash-alt"></i> Clear Chat</button>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="main-chat">
            <div class="chat-header">
                <div class="assistant-info">
                    <div class="assistant-avatar"><i class="fas fa-robot"></i></div>
                    <div class="assistant-details">
                        <h3 id="assistantName">Assistant</h3>
                        <p><span class="online-indicator"></span> READY TO HELP</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="downloadChat" class="icon-btn"><i class="fas fa-download"></i></button>
                    <button id="shareChat" class="icon-btn"><i class="fas fa-share-alt"></i></button>
                </div>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div class="message bot">
                    <div class="message-avatar"><i class="fas fa-robot"></i></div>
                    <div class="message-content">Welcome! Select your role and a category to get started.</div>
                </div>
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="userInput" placeholder="Type your question here... (Press Enter to send)" rows="1"></textarea>
                    <div class="action-buttons">
                        <button id="voiceInputBtn" class="voice-btn" title="Voice Input"><i class="fas fa-microphone"></i></button>
                        <button id="voiceOutputBtn" class="voice-output-btn" title="Read Last Message"><i class="fas fa-volume-up"></i></button>
                        <button id="stopSpeakingBtn" class="stop-btn" title="Stop Speaking"><i class="fas fa-stop"></i></button>
                        <button id="sendBtn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
